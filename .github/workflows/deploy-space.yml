name: Deploy Hugging Face Space

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  HF_SPACE_ID: ${{ vars.HF_SPACE_ID || 'binzhango/hf-build-small-hackathon' }}

jobs:
  deploy:
    name: Deploy Space
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Validate Python files
        run: uv run --no-project python -m py_compile app.py scripts/deploy_space.py

      - name: Deploy to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: uv run --no-project --with huggingface_hub python scripts/deploy_space.py
